<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZESTFIT Cart</title>
<style>
body {font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5;}
h1 {text-align: center;}
.cart-container {max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px;}
.item {display: flex; gap: 15px; border-bottom: 1px solid #ddd; padding: 15px 0; align-items: center;}
.item img {width: 80px; height: 80px; object-fit: cover; border-radius: 8px;}
.details {flex: 1;}
.buttons button {margin: 5px; padding: 5px 10px; cursor: pointer;}
.total {text-align: right; font-size: 20px; margin-top: 20px;}
.empty {text-align: center; color: gray;}
.checkout {display: block; margin-top: 20px; padding: 10px; width: 100%; background: black; color: white; border: none; font-size: 16px; cursor: pointer;}
</style>
</head>

<body>

<h1>Your Cart 🛒</h1>

<div class="cart-container" id="cart-container"></div>

<div class="total" id="total"></div>

<button class="checkout" onclick="checkout()">Proceed to Checkout</button>

<script>
function loadCart() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let container = document.getElementById("cart-container");
    let totalBox = document.getElementById("total");

    container.innerHTML = "";

    if (cart.length === 0) {
        container.innerHTML = "<p class='empty'>Your cart is empty 😢</p>";
        totalBox.innerHTML = "";
        return;
    }

    let total = 0;

    cart.forEach((item, index) => {
        total += item.price * item.quantity;

        container.innerHTML += `
            <div class="item">
                <img src="${item.image}" alt="">
                <div class="details">
                    <h3>${item.name}</h3>
                    <p>₹${item.price}</p>
                    <p>Quantity: ${item.quantity}</p>

                    <div class="buttons">
                        <button onclick="increase(${index})">+</button>
                        <button onclick="decrease(${index})">-</button>
                        <button onclick="removeItem(${index})">Remove</button>
                    </div>
                </div>
            </div>
        `;
    });

    totalBox.innerHTML = "<strong>Total: ₹" + total + "</strong>";
}

function increase(index) {
    let cart = JSON.parse(localStorage.getItem("cart"));
    cart[index].quantity++;
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

function decrease(index) {
    let cart = JSON.parse(localStorage.getItem("cart"));
    if (cart[index].quantity > 1) {
        cart[index].quantity--;
    }
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem("cart"));
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

function checkout() {
    alert("Checkout coming soon 🚀");
}

loadCart();
</script>

</body>
</html>
